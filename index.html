<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="c.css">
    <title>ລົງທະບຽນ ແລະ ເຂົ້າສູ່ລະບົບ</title>
</head>
<body>

    <div class="container">
        <div id="login-form">
            <h2>ເຂົ້າສູ່ລະບົບ</h2>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="login-email">ອີເມວ</label>
                    <input type="email" id="login-email" required placeholder="Email">
                </div>
                <div class="form-group">
                    <label for="login-password">ລະຫັດຜ່ານ</label>
                    <input type="password" id="login-password" required placeholder="Password">
                </div>
                <button type="submit">ເຂົ້າສູ່ລະບົບ</button>
            </form>
            <div class="toggle-text">
                ຍັງບໍ່ມີບັນຊີເທື່ອບໍ? <a onclick="toggleForm('register')">ລົງທະບຽນ</a>
            </div>
        </div>

    

</body>
</html>
